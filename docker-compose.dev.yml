services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: hackit_app_dev
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "1000:1000"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - internal

  caddy:
    image: caddy:2
    container_name: hackit_caddy_dev
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile
      - caddy_data_dev:/data
      - caddy_config_dev:/config
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  caddy_data_dev:
  caddy_config_dev: